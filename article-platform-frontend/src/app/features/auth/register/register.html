<div class="auth-container">

    <mat-card>
  
      <mat-card-title>
        Register
      </mat-card-title>
  
      <form [formGroup]="registerForm"
            (ngSubmit)="onSubmit()">
  
        <mat-form-field appearance="outline"
                        class="full-width">
  
          <mat-label>Username</mat-label>
  
          <input
            matInput
            formControlName="username">
  
        </mat-form-field>
  
        <mat-form-field appearance="outline"
                        class="full-width">
  
          <mat-label>Email</mat-label>
  
          <input
            matInput
            type="email"
            formControlName="email">
  
        </mat-form-field>
  
        <mat-form-field appearance="outline"
                        class="full-width">
  
          <mat-label>Password</mat-label>
  
          <input
            matInput
            type="password"
            formControlName="password">
  
        </mat-form-field>
  
        <button
          mat-raised-button
          color="primary"
          class="full-width">
  
          Register
  
        </button>
  
      </form>
  
    </mat-card>
  
  </div>
