<div class="auth-container">

    <mat-card>
  
      <mat-card-title>
        Login
      </mat-card-title>
  
      <form [formGroup]="loginForm"
            (ngSubmit)="onSubmit()">
  
        <mat-form-field appearance="outline"
                        class="full-width">
  
          <mat-label>Email</mat-label>
  
          <input
            matInput
            type="email"
            formControlName="email">
  
        </mat-form-field>
  
        <mat-form-field appearance="outline"
                        class="full-width">
  
          <mat-label>Password</mat-label>
  
          <input
            matInput
            type="password"
            formControlName="password">
  
        </mat-form-field>
  
        <p *ngIf="errorMessage"
            class="error-text">

            {{ errorMessage }}

        </p>

        <button
          mat-raised-button
          color="primary"
          class="full-width">
  
          Login
  
        </button>
  
      </form>
  
    </mat-card>
  
  </div>
